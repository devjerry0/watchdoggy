<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#111" />
<title>doggy</title>
<style>
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: system-ui, sans-serif; margin: 1.5rem; background: #111; color: #eee;
         -webkit-tap-highlight-color: transparent;
         padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left); }
  h1 { font-size: 1.3rem; margin: 0 0 1rem; }
  img { max-width: 100%; border: 2px solid #333; border-radius: 8px; }
  .row { display: flex; gap: 2rem; flex-wrap: wrap; }
  .panel { flex: 1; min-width: 280px; }
  /* inline-block wrapper hugs the video at its native size (desktop) and caps
     at the panel width via `img { max-width:100% }` (fills a phone screen when
     stacked). The zone canvas overlays it and is JS-sized to the img. */
  #vidwrap { position: relative; display: inline-block; line-height: 0; max-width: 100%; }
  #zonecanvas { position: absolute; left: 0; top: 0; cursor: crosshair;
                touch-action: manipulation; }
  label { display: block; margin: .6rem 0 .2rem; font-size: .85rem; color: #aaa; }
  input[type=range] { width: 100%; height: 1.9rem; touch-action: pan-y; }
  .stat { font-size: 1.5rem; }
  .statline { display: flex; flex-wrap: wrap; gap: .2rem .7rem; font-size: .9rem; margin: .3rem 0 .5rem; }
  .muted { color: #f66; }
  .checkrow { display: flex; align-items: center; gap: .5rem; margin-top: .8rem; font-size: .95rem; }
  .checkrow input { width: 1.15rem; height: 1.15rem; }
  .btnrow { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1rem; align-items: center; }
  button { padding: .6rem 1.1rem; border: 0; border-radius: 6px;
           background: #2a7; color: #041; font-weight: 600; cursor: pointer;
           font-size: 1rem; touch-action: manipulation; }
  #zonehint { font-size: .8rem; color: #aaa; }
  #events { font-size: .8rem; color: #999; max-height: 8rem; overflow: auto; }

  @media (max-width: 640px) {
    body { margin: .75rem; }
    .row { gap: 1.25rem; }
    h1 { font-size: 1.15rem; }
    .stat { font-size: 1.3rem; }
    label { margin-top: .8rem; }
    input[type=range] { height: 2.2rem; }
    .btnrow button { flex: 1 1 8rem; padding: .8rem 1rem; }
  }
</style>
</head>
<body>
<h1>🐕 doggy dashboard</h1>
<div class="row">
  <div class="panel">
    <div id="vidwrap">
      <img id="live" src="/stream.mjpg" alt="live" />
      <canvas id="zonecanvas"></canvas>
    </div>
    <div class="btnrow">
      <button onclick="finishZone()">Finish zone</button>
      <button onclick="clearZone()">Clear zone</button>
      <span id="zonehint">tap to place zone points</span>
    </div>
  </div>
  <div class="panel">
    <div class="stat">State: <span id="state">–</span></div>
    <div class="statline">
      <span>FPS: <span id="fps">–</span></span>
      <span>dogs: <span id="dogs">–</span></span>
      <span>conf: <span id="conf">–</span></span>
      <span>fires/hr: <span id="fires">–</span></span>
      <span>🌡️ <span id="temp">–</span>°C <span id="cooling"></span> <span id="muted"></span></span>
      <span title="Pi power health from under-voltage flags">⚡ <span id="power">–</span></span>
    </div>
    <label>confidence <span id="confidence_v"></span></label>
    <input id="confidence" type="range" min="0" max="1" step="0.01" />
    <label>confirm_seconds <span id="confirm_seconds_v"></span></label>
    <input id="confirm_seconds" type="range" min="0" max="5" step="0.1" />
    <label>window_m — dog-frames needed <span id="window_m_v"></span></label>
    <input id="window_m" type="range" min="1" max="10" step="1" />
    <label>window_n — of the last N frames (m ≤ n) <span id="window_n_v"></span></label>
    <input id="window_n" type="range" min="1" max="10" step="1" />
    <label>cooldown_min_seconds <span id="cooldown_min_seconds_v"></span></label>
    <input id="cooldown_min_seconds" type="range" min="0" max="60" step="1" />
    <label>cooldown_max_seconds <span id="cooldown_max_seconds_v"></span></label>
    <input id="cooldown_max_seconds" type="range" min="0" max="120" step="1" />
    <label>max_fires_per_hour <span id="max_fires_per_hour_v"></span></label>
    <input id="max_fires_per_hour" type="range" min="0" max="60" step="1" />
    <label>detect_interval_seconds <span id="detect_interval_seconds_v"></span></label>
    <input id="detect_interval_seconds" type="range" min="0" max="3" step="0.1" />
    <label class="checkrow"><input id="safety_enabled" type="checkbox" /> safety enabled</label>
    <div class="btnrow">
      <button onclick="testSound()">Test sound</button>
      <button onclick="save()">Save to .env</button>
    </div>
    <h3>Recent fires</h3>
    <div id="events"></div>
  </div>
</div>
<script>
const KNOBS = ["confidence","confirm_seconds","window_m","window_n","cooldown_min_seconds",
               "cooldown_max_seconds","max_fires_per_hour","detect_interval_seconds"];
async function patch(body){
  await fetch("/api/settings",{method:"PATCH",headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)});
}
KNOBS.forEach(k => {
  const el = document.getElementById(k);
  el.addEventListener("change", () => patch({[k]: parseFloat(el.value)}));
});
document.getElementById("safety_enabled").addEventListener("change", e =>
  patch({safety_enabled: e.target.checked}));
async function testSound(){ await fetch("/api/test-sound",{method:"POST"}); }
async function save(){ await fetch("/api/settings/save",{method:"POST"}); }
async function poll(){
  const s = await (await fetch("/api/status")).json();
  document.getElementById("state").textContent = s.state;
  document.getElementById("fps").textContent = s.fps;
  document.getElementById("conf").textContent = s.confidence;
  document.getElementById("dogs").textContent = s.dogs;
  document.getElementById("fires").textContent = s.fires_this_hour;
  document.getElementById("muted").innerHTML = s.muted ? '<span class="muted">MUTED</span>' : '';
  document.getElementById("temp").textContent = s.temp_c == null ? "–" : s.temp_c.toFixed(1);
  const cooling = s.detect_interval_effective > s.settings.detect_interval_seconds;
  document.getElementById("cooling").innerHTML = cooling ? '<span style="color:#fa0">COOLING</span>' : '';
  let pTxt = "–", pColor = "#888", pTip = "power state unavailable (not a Pi?)";
  if (s.undervolt_now === true){ pTxt = "UNDER-VOLT"; pColor = "#f55"; pTip = "supply is below spec RIGHT NOW — fix the power source"; }
  else if (s.undervolt_since_boot === true){ pTxt = "dipped"; pColor = "#fa0"; pTip = "voltage OK now, but dipped below spec at least once since boot"; }
  else if (s.undervolt_now === false){ pTxt = "OK"; pColor = "#3fbf7f"; pTip = "no under-voltage now or since boot"; }
  const pEl = document.getElementById("power");
  pEl.innerHTML = `<span style="color:${pColor}">${pTxt}</span>`;
  pEl.parentElement.title = pTip;
  for (const k of KNOBS){
    const el = document.getElementById(k);
    if (document.activeElement !== el){ el.value = s.settings[k]; }
    document.getElementById(k+"_v").textContent = s.settings[k];
  }
  document.getElementById("safety_enabled").checked = s.settings.safety_enabled;
  document.getElementById("events").innerHTML =
    s.events.slice(-10).reverse().map(e =>
      `<div style="margin:.2rem 0"><img src="/events/${e.thumb}" alt="" ` +
      `style="height:38px;vertical-align:middle;border-radius:4px;margin-right:.4rem">` +
      `${e.ts.toFixed(1)}s · conf ${e.confidence}</div>`).join("");
  if (drawing.length === 0 && s.settings.zone_enabled){ drawZone(s.settings.zone_points, false); }
}
const img = document.getElementById("live");
const canvas = document.getElementById("zonecanvas");
const ctx = canvas.getContext("2d");
let drawing = [];         // in-progress points, normalized [0,1]
function sizeCanvas(){ canvas.width = img.clientWidth; canvas.height = img.clientHeight; }
img.addEventListener("load", sizeCanvas);
window.addEventListener("resize", () => { sizeCanvas(); });
window.addEventListener("orientationchange", () => { setTimeout(sizeCanvas, 200); });
canvas.addEventListener("click", e => {
  const r = img.getBoundingClientRect();
  drawing.push([(e.clientX - r.left) / r.width, (e.clientY - r.top) / r.height]);
  drawZone(drawing, true);
});
function drawZone(points, inProgress){
  sizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!points.length) return;
  ctx.strokeStyle = inProgress ? "#0af" : "#fa0";
  ctx.lineWidth = 2; ctx.beginPath();
  points.forEach((p, i) => {
    const x = p[0] * canvas.width, y = p[1] * canvas.height;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    ctx.fillStyle = "#0af"; ctx.fillRect(x - 3, y - 3, 6, 6);
  });
  if (!inProgress) ctx.closePath();
  ctx.stroke();
}
async function finishZone(){
  if (drawing.length < 3){ alert("place at least 3 points"); return; }
  await patch({zone_enabled: true, zone_points: drawing});
  drawing = [];
}
async function clearZone(){
  drawing = [];
  await patch({zone_enabled: false, zone_points: []});
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
setInterval(poll, 500); poll();
</script>
</body>
</html>
